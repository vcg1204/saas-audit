<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Subscription</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <nav>
        <span class="brand">SaaS Audit</span>
        <a href="/">Dashboard</a>
        <a href="/subscriptions">Subscriptions</a>
        <a href="/add">Add New</a>
        <a href="/insights">Insights</a>
        <a href="/recommendations">Recommendations</a>
        <a href="/health">Health</a>
        <a href="/budget">Budget</a>
        <a href="/costperemployee">Cost/Employee</a>
    </nav>

    <div class="container">
        <h1>Edit Subscription</h1>

        <div class="section">
            <form method="POST">
                <div class="field">
                    <label>Tool Name *</label>
                    <input type="text" name="tool_name" required value="{{ sub.tool_name }}">
                </div>

                <div class="field">
                    <label>Category</label>
                    <select name="category">
                        {% for cat in ["Communication", "Design", "Development", "Analytics", "HR", "Finance",
                        "Marketing", "Project Management", "Security", "Other"] %}
                        <option value="{{ cat }}" {% if sub.category==cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field">
                    <label>Cost *</label>
                    <input type="number" name="cost" step="0.01" required value="{{ sub.cost }}">
                </div>

                <div class="field">
                    <label>Billing Cycle</label>
                    <select name="billing_cycle">
                        <option value="Monthly" {% if sub.billing_cycle=="Monthly" %}selected{% endif %}>Monthly
                        </option>
                        <option value="Annual" {% if sub.billing_cycle=="Annual" %}selected{% endif %}>Annual</option>
                    </select>
                </div>

                <div class="field">
                    <label>Seats Paid</label>
                    <input type="number" name="seats_paid" value="{{ sub.seats_paid or '' }}">
                </div>

                <div class="field">
                    <label>Seats Actually Used</label>
                    <input type="number" name="seats_used" value="{{ sub.seats_used or '' }}">
                </div>

                <div class="field">
                    <label>Renewal Date</label>
                    <input type="date" name="renewal_date" value="{{ sub.renewal_date or '' }}">
                </div>

                <div class="field">
                    <label>Owner</label>
                    <input type="text" name="owner" value="{{ sub.owner or '' }}">
                </div>

                <div class="field">
                    <label>Notes</label>
                    <textarea name="notes">{{ sub.notes or '' }}</textarea>
                </div>

                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/subscriptions" class="btn" style="margin-left:12px;">Cancel</a>
            </form>
        </div>
    </div>

</body>

</html>
